<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Shivam Kumar">
    <title>Gift Page</title>

<link rel="icon" href="logo.ico" type="image/x-icon">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background-color: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        i {
            font-size: clamp(2.5rem, 6vw, 4rem);
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(1.8rem, 6vw, 3rem);
            line-height: 1.3;
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 30px;
            background: white;
            color: black;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .hidden { display: none; }


        .back-btn {
            position: fixed;
            top: 25px;
            left: 25px;
            padding: 10px 20px;
            background: #ff2b2b;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 500;
            z-index: 1000;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        .back-btn:hover {
            background: #ff0000;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<a href="giftpage.html" class="back-btn">&larr; Back</a>
    <div class="container">

        <!-- Button -->
        <button id="giftBtn" onclick="openGift()">🎁 Buy to Gift</button>

        <!-- Hidden Content -->
        <div id="content" class="hidden">
            <i class="fa-solid fa-hand-middle-finger"></i>
            <h1>Fuck You😈</h1>
        </div>

    </div>

    <!-- Audio -->
    <audio id="bgm">
        <source src="https://www.myinstants.com/media/sounds/faaah.mp3" type="audio/mpeg">
    </audio>

    <script>
        function openGift() {
            document.getElementById("giftBtn").style.display = "none";
            document.getElementById("content").classList.remove("hidden");

            const audio = document.getElementById("bgm");
            let count = 0;

            audio.play();

            audio.onended = function () {
                count++;
                if (count < 3) {
                    audio.currentTime = 0;
                    audio.play();
                }
            };
        }
    </script>

</body>
</html>
